name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  java-service-tests:
    name: Test ${{ matrix.service.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: auth-service
            path: CSMS/backend/auth-service
          - name: user-service
            path: CSMS/backend/user-service
          - name: gateway-service
            path: CSMS/backend/gateway-service
          - name: admission-service
            path: CSMS/backend/admission-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Maven tests
        working-directory: ${{ matrix.service.path }}
        run: mvn --batch-mode clean test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.service.name }}
          path: ${{ matrix.service.path }}/target/surefire-reports/
          if-no-files-found: ignore
