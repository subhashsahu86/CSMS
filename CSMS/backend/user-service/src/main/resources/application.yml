spring:
  application:
    name: user-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/user_db?options=-c%20TimeZone=UTC}
    username: ${DB_USERNAME:user_user}
    password: ${DB_PASSWORD:user_password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    issuer: school-management-platform
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
