spring:
  application:
    name: admission-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/admission_db?options=-c%20TimeZone=UTC}
    username: ${DB_USERNAME:admission_user}
    password: ${DB_PASSWORD:admission_password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
