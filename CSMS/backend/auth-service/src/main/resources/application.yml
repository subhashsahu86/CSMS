spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth_db?options=-c%20TimeZone=UTC}
    username: ${DB_USERNAME:auth_user}
    password: ${DB_PASSWORD:auth_password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8082}


management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    issuer: school-management-platform
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 7
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
  bootstrap-admin:
    enabled: ${BOOTSTRAP_ADMIN_ENABLED:true}
    username: ${BOOTSTRAP_ADMIN_USERNAME:ADM0001}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:Admin@12345}
    email: ${BOOTSTRAP_ADMIN_EMAIL:admin@school.local}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
