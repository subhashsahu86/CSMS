spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowed-headers: "*"
                allow-credentials: true
          routes:
            - id: auth-service-auth
              uri: ${AUTH_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/v1/auth/**
            - id: auth-service-admin
              uri: ${AUTH_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/v1/admin/**
            - id: user-service-profiles
              uri: ${USER_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/v1/profiles/**
            - id: admission-service
              uri: ${ADMISSION_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/v1/admissions/**

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
