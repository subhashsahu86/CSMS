name: Docker Build

on:
  workflow_dispatch:
    inputs:
      push_images:
        description: Push images to GitHub Container Registry
        required: true
        default: false
        type: boolean
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  docker-build:
    name: Build image ${{ matrix.service.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: auth-service
            path: backend/auth-service
            port: 8082
          - name: user-service
            path: backend/user-service
            port: 8083
          - name: gateway-service
            path: backend/gateway-service
            port: 8080
          - name: admission-service
            path: backend/admission-service
            port: 8084

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build jar
        working-directory: ${{ matrix.service.path }}
        run: mvn --batch-mode clean package

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          IMAGE_NAME="${REGISTRY}/${GITHUB_REPOSITORY_OWNER}/school-${{ matrix.service.name }}"
          IMAGE_NAME="$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' || inputs.push_images == true
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.path }}
          file: ${{ matrix.service.path }}/Dockerfile
          push: ${{ github.event_name == 'push' || inputs.push_images == true }}
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.image_name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.service.name }}
