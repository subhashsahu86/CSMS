services:
  auth-postgres:
    image: postgres:16
    container_name: auth-postgres
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    networks:
      - school-network

  user-postgres:
    image: postgres:16
    container_name: user-postgres
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    networks:
      - school-network

  admission-postgres:
    image: postgres:16
    container_name: admission-postgres
    environment:
      POSTGRES_DB: admission_db
      POSTGRES_USER: admission_user
      POSTGRES_PASSWORD: ${ADMISSION_DB_PASSWORD}
    volumes:
      - admission_postgres_data:/var/lib/postgresql/data
    networks:
      - school-network

  auth-service:
    image: ${IMAGE_REGISTRY}/${IMAGE_OWNER}/school-auth-service:${IMAGE_TAG}
    container_name: auth-service
    environment:
      SERVER_PORT: 8082
      DB_URL: jdbc:postgresql://auth-postgres:5432/auth_db?options=-c%20TimeZone=UTC
      DB_USERNAME: auth_user
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED:-true}
    depends_on:
      - auth-postgres
    networks:
      - school-network

  user-service:
    image: ${IMAGE_REGISTRY}/${IMAGE_OWNER}/school-user-service:${IMAGE_TAG}
    container_name: user-service
    environment:
      SERVER_PORT: 8083
      DB_URL: jdbc:postgresql://user-postgres:5432/user_db?options=-c%20TimeZone=UTC
      DB_USERNAME: user_user
      DB_PASSWORD: ${USER_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - user-postgres
    networks:
      - school-network

  admission-service:
    image: ${IMAGE_REGISTRY}/${IMAGE_OWNER}/school-admission-service:${IMAGE_TAG}
    container_name: admission-service
    environment:
      SERVER_PORT: 8084
      DB_URL: jdbc:postgresql://admission-postgres:5432/admission_db?options=-c%20TimeZone=UTC
      DB_USERNAME: admission_user
      DB_PASSWORD: ${ADMISSION_DB_PASSWORD}
    depends_on:
      - admission-postgres
    networks:
      - school-network

  gateway-service:
    image: ${IMAGE_REGISTRY}/${IMAGE_OWNER}/school-gateway-service:${IMAGE_TAG}
    container_name: gateway-service
    environment:
      SERVER_PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:8082
      USER_SERVICE_URL: http://user-service:8083
      ADMISSION_SERVICE_URL: http://admission-service:8084
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - user-service
      - admission-service
    networks:
      - school-network

volumes:
  auth_postgres_data:
  user_postgres_data:
  admission_postgres_data:

networks:
  school-network:
    driver: bridge
